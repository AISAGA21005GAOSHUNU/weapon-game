<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>武器实验室：终极对决</title>
    <style>
        :root { --neon-blue: #00f3ff; --neon-pink: #ff00ff; --bg-dark: #0a0b10; }
        body { background: var(--bg-dark); color: white; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; text-align: center; }
        
        /* 开始画面 */
        #start-screen { margin-top: 50px; }
        .mode-btn { display: block; width: 300px; margin: 15px auto; background: var(--neon-blue); color: #000; border: none; padding: 15px 20px; font-size: 1.3em; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; box-shadow: 0 0 10px var(--neon-blue); }
        .mode-btn:hover { transform: scale(1.05); background: #fff; }

        /* 游戏画面 */
        #game-screen { display: none; width: 100%; max-width: 800px; }
        
        /* 记分板 */
        .scoreboard { display: flex; justify-content: space-around; background: #1a1c25; padding: 15px; border-radius: 10px; border: 2px solid #333; margin-bottom: 20px; }
        .player-score { font-size: 1.5em; font-weight: bold; color: #555; transition: 0.3s; padding: 10px; border-radius: 8px; }
        .player-score.active { color: var(--neon-blue); background: rgba(0, 243, 255, 0.1); text-shadow: 0 0 10px var(--neon-blue); transform: scale(1.05); border: 1px solid var(--neon-blue); }
        .score-val { color: var(--neon-pink); font-size: 1.2em; }

        /* 题目区 */
        .question-box { background: rgba(0, 243, 255, 0.05); border: 1px dashed var(--neon-blue); padding: 50px 20px; border-radius: 10px; margin-bottom: 20px; position: relative; }
        .power-tag { position: absolute; top: 10px; right: 10px; color: var(--neon-pink); font-weight: bold; font-size: 1.2em; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 5px; }
        
        .weapon-display { font-size: 3em; font-weight: bold; letter-spacing: 5px; margin: 20px 0; }
        .drop-zone { display: inline-block; width: 60px; height: 60px; line-height: 60px; border-bottom: 4px solid #fff; margin: 0 5px; color: var(--neon-pink); text-align: center; vertical-align: middle; background: rgba(255,255,255,0.1); border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .drop-zone.corrected { color: #ffeb3b; border-bottom-color: #ffeb3b; background: rgba(255, 235, 59, 0.2); text-shadow: 0 0 10px #ffeb3b; }

        /* 零件库 */
        .inventory { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 30px; }
        .part { width: 60px; height: 60px; line-height: 60px; background: #222; border: 2px solid var(--neon-pink); font-size: 1.8em; font-weight: bold; border-radius: 10px; cursor: pointer; user-select: none; transition: 0.2s; }
        .part:active { transform: translateY(5px); background: var(--neon-pink); }

        /* 控制按钮 */
        .controls button { padding: 12px 30px; font-size: 1.2em; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; margin: 0 10px; }
        #check-btn { background: var(--neon-blue); color: #000; }
        #clear-btn { background: #555; color: #fff; }

        /* 提示讯息 */
        #msg-overlay { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 3em; font-weight: bold; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 1000; text-shadow: 0 0 20px #000; white-space: nowrap; }
        
        /* 结算画面与排行榜 */
        #end-screen { display: none; margin-top: 50px; width: 100%; max-width: 600px; }
        #winner-text { font-size: 2em; color: var(--neon-pink); margin-bottom: 20px; text-shadow: 0 0 15px var(--neon-pink); }
        
        .leaderboard-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1a1c25; border-radius: 10px; overflow: hidden; }
        .leaderboard-table th, .leaderboard-table td { padding: 12px; border-bottom: 1px solid #333; }
        .leaderboard-table th { background: #2a2d3d; color: var(--neon-blue); }
        .leaderboard-table td.rank-1 { color: gold; font-weight: bold; }
        .leaderboard-table td.rank-2 { color: silver; font-weight: bold; }
        .leaderboard-table td.rank-3 { color: #cd7f32; font-weight: bold; }
    </style>
</head>
<body>

    <h1 style="color: var(--neon-pink);">⚔️ 零件补完计划</h1>

    <div id="start-screen">
        <h2>请选择任务模式</h2>
        <button class="mode-btn" onclick="startGame(1, 1)">👤 单人极限挑战</button>
        <button class="mode-btn" onclick="startGame(2, 1)">⚔️ 双人对战 (1P 先发)</button>
        <button class="mode-btn" onclick="startGame(2, 2)">⚔️ 双人对战 (2P 先发)</button>
    </div>

    <div id="game-screen">
        <div class="scoreboard">
            <div id="p1-panel" class="player-score">1P 力量: <span id="p1-score" class="score-val">0</span></div>
            <div id="p2-panel" class="player-score" style="display:none;">2P 力量: <span id="p2-score" class="score-val">0</span></div>
        </div>

        <div class="question-box">
            <div class="power-tag">力量值: <span id="q-power">0</span></div>
            <div id="q-text" class="weapon-display"></div>
        </div>

        <div class="inventory" id="inventory"></div>

        <div class="controls">
            <button id="clear-btn" onclick="clearFills()">清除重填</button>
            <button id="check-btn" onclick="checkAnswer()">验证发射</button>
        </div>
    </div>

    <div id="end-screen">
        <div id="winner-text"></div>
        
        <div id="leaderboard-container">
            <h3 style="color: var(--neon-blue);">🏆 武器实验室 最高力量排行榜</h3>
            <table class="leaderboard-table" id="leaderboard-table">
                </table>
        </div>

        <br>
        <button class="mode-btn" onclick="location.reload()" style="width: 200px;">重新开始任务</button>
        <button class="mode-btn" onclick="clearLeaderboard()" style="width: 200px; background: #555; box-shadow: none; font-size: 1em;">清除排行榜数据</button>
    </div>

    <div id="msg-overlay"></div>

    <script>
        // 确保整个网页载入完成后再执行核心逻辑，防止按钮失效
        window.onload = function() {
            // 20种题库 (纯文字全简体，严格对齐图片缺字要求)
            // 括号 [] 内的字代表需要学生填空的零件
            const allWeapons = [
                { pattern: "突击[步][枪]", power: 300 },
                { pattern: "异能[枪]", power: 210 },
                { pattern: "汽油[弹]", power: 200 },
                { pattern: "左[轮][手][枪]", power: 165 },
                { pattern: "扭曲[器]", power: 130 },
                { pattern: "变形[机]", power: 120 },
                { pattern: "榴[弹]发射[器]", power: 110 },
                { pattern: "反[器]材[步][枪]", power: 105 },
                { pattern: "[机][枪]", power: 100 },
                { pattern: "加特林[机][枪]", power: 100 },
                { pattern: "永冻[枪]", power: 95 },
                { pattern: "狙击[步][枪]", power: 90 },
                { pattern: "竞敌重槌[器]", power: 80 },
                { pattern: "[手]枪", power: 75 },
                { pattern: "权[器]", power: 70 },
                { pattern: "霰[弹][枪]", power: 65 },
                { pattern: "卡宾[枪]", power: 60 },
                { pattern: "冲锋[枪]", power: 50 },
                { pattern: "信号[枪]", power: 30 },
                { pattern: "烟雾[弹]", power: 1 }
            ];

            const baseParts = ['枪', '步', '弹', '机', '手', '器', '轮'];

            window.players = 1;
            window.turn = 1; 
            window.scores = { 1: 0, 2: 0 };
            window.questions = [];
            window.currentQ = 0;
            window.currentAnswers = []; 
            window.userFills = []; 

            window.shuffle = function(array) {
                return array.sort(() => Math.random() - 0.5);
            };

            window.startGame = function(mode, startingPlayer) {
                window.players = mode;
                window.turn = startingPlayer;
                
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'block';
                
                if (window.players === 2) {
                    document.getElementById('p2-panel').style.display = 'block';
                }

                window.questions = window.shuffle([...allWeapons]);
                window.currentQ = 0;
                window.loadQuestion();
            };

            window.loadQuestion = function() {
                if (window.currentQ >= window.questions.length) {
                    window.endGame();
                    return;
                }

                document.getElementById('p1-panel').classList.toggle('active', window.turn === 1);
                document.getElementById('p2-panel').classList.toggle('active', window.turn === 2);

                let q = window.questions[window.currentQ];
                document.getElementById('q-power').innerText = q.power;

                let displayHTML = "";
                window.currentAnswers = [];
                window.userFills = [];
                
                let partsRegex = /\[(.*?)\]/g;
                let lastIdx = 0;
                let match;
                let blankIndex = 0;

                while ((match = partsRegex.exec(q.pattern)) !== null) {
                    displayHTML += q.pattern.substring(lastIdx, match.index);
                    displayHTML += `<span class="drop-zone" id="dz-${blankIndex}" onclick="clearSingle(${blankIndex})"></span>`;
                    window.currentAnswers.push(match[1]);
                    window.userFills.push("");
                    blankIndex++;
                    lastIdx = partsRegex.lastIndex;
                }
                displayHTML += q.pattern.substring(lastIdx);
                
                document.getElementById('q-text').innerHTML = displayHTML;

                let shuffledParts = window.shuffle([...baseParts]);
                let invHTML = "";
                shuffledParts.forEach(p => {
                    invHTML += `<div class="part" onclick="fillBlank('${p}')">${p}</div>`;
                });
                document.getElementById('inventory').innerHTML = invHTML;

                document.getElementById('check-btn').disabled = false;
            };

            window.fillBlank = function(char) {
                let emptyIdx = window.userFills.indexOf("");
                if (emptyIdx !== -1) {
                    window.userFills[emptyIdx] = char;
                    document.getElementById(`dz-${emptyIdx}`).innerText = char;
                }
            };

            window.clearSingle = function(idx) {
                window.userFills[idx] = "";
                let dz = document.getElementById(`dz-${idx}`);
                dz.innerText = "";
                dz.classList.remove('corrected');
            };

            window.clearFills = function() {
                window.userFills = window.userFills.map(() => "");
                document.querySelectorAll('.drop-zone').forEach(el => {
                    el.innerText = "";
                    el.classList.remove('corrected');
                });
            };

            window.checkAnswer = function() {
                if (window.userFills.includes("")) {
                    alert("请填满所有零件空缺！");
                    return;
                }

                document.getElementById('check-btn').disabled = true;

                let isCorrect = window.userFills.join("") === window.currentAnswers.join("");
                let q = window.questions[window.currentQ];

                if (isCorrect) {
                    window.showMsg(`✅ 补完成功！ +${q.power}`, "#0f0");
                    window.scores[window.turn] += q.power;
                    document.getElementById(`p${window.turn}-score`).innerText = window.scores[window.turn];
                    
                    setTimeout(window.nextPlayerQuestion, 1200);
                } else {
                    window.showMsg("❌ 零件错误！", "#f00");
                    
                    window.currentAnswers.forEach((ans, idx) => {
                        let dz = document.getElementById(`dz-${idx}`);
                        dz.innerText = ans;
                        dz.classList.add('corrected');
                    });

                    setTimeout(window.nextPlayerQuestion, 2500);
                }
            };

            window.nextPlayerQuestion = function() {
                window.currentQ++;
                if (window.players === 2) {
                    window.turn = window.turn === 1 ? 2 : 1;
                }
                window.loadQuestion();
            };

            window.showMsg = function(text, color) {
                let overlay = document.getElementById('msg-overlay');
                overlay.innerText = text;
                overlay.style.color = color;
                overlay.style.opacity = 1;
                setTimeout(() => overlay.style.opacity = 0, 1000);
            };

            window.endGame = function() {
                document.getElementById('game-screen').style.display = 'none';
                document.getElementById('end-screen').style.display = 'block';
                
                let winText = "";
                let today = new Date().toLocaleDateString();

                if (window.players === 1) {
                    winText = `单人任务完成！<br>总力量值: <span style="color:#fff">${window.scores[1]}</span>`;
                    window.saveScore(window.scores[1], "单人玩家", today);
                } else {
                    if (window.scores[1] > window.scores[2]) winText = `🏆 1P 获胜！<br><span style="font-size:0.5em; color:#fff">1P: ${window.scores[1]} 分 / 2P: ${window.scores[2]} 分</span>`;
                    else if (window.scores[2] > window.scores[1]) winText = `🏆 2P 获胜！<br><span style="font-size:0.5em; color:#fff">1P: ${window.scores[1]} 分 / 2P: ${window.scores[2]} 分</span>`;
                    else winText = `🤝 平手！<br><span style="font-size:0.5em; color:#fff">双方皆为 ${window.scores[1]} 分</span>`;
                    
                    window.saveScore(window.scores[1], "1P 玩家", today);
                    window.saveScore(window.scores[2], "2P 玩家", today);
                }
                document.getElementById('winner-text').innerHTML = winText;
                
                window.renderLeaderboard();
            };

            window.saveScore = function(score, playerName, date) {
                if (score === 0) return; 
                try {
                    let board = JSON.parse(localStorage.getItem('weaponLeaderboard')) || [];
                    board.push({ name: playerName, score: score, date: date });
                    board.sort((a, b) => b.score - a.score);
                    board = board.slice(0, 5);
                    localStorage.setItem('weaponLeaderboard', JSON.stringify(board));
                } catch (e) {
                    console.error("无法保存排行榜记录:", e);
                }
            };

            window.renderLeaderboard = function() {
                try {
                    let board = JSON.parse(localStorage.getItem('weaponLeaderboard')) || [];
                    let tbody = `<tr><th>排名</th><th>身份</th><th>力量总计</th><th>日期</th></tr>`;
                    
                    if (board.length === 0) {
                        tbody += `<tr><td colspan="4" style="text-align:center;">尚无记录</td></tr>`;
                    } else {
                        board.forEach((entry, i) => {
                            let rankClass = i < 3 ? `rank-${i+1}` : '';
                            tbody += `<tr>
                                <td class="${rankClass}">${i + 1}</td>
                                <td>${entry.name}</td>
                                <td style="color:var(--neon-pink); font-weight:bold;">${entry.score}</td>
                                <td>${entry.date}</td>
                            </tr>`;
                        });
                    }
                    document.getElementById('leaderboard-table').innerHTML = tbody;
                } catch (e) {
                    document.getElementById('leaderboard-table').innerHTML = `<tr><td colspan="4">读取数据失败</td></tr>`;
                }
            };

            window.clearLeaderboard = function() {
                if(confirm("确定要清除所有的排行榜记录吗？")) {
                    localStorage.removeItem('weaponLeaderboard');
                    window.renderLeaderboard();
                }
            };
        };
    </script>
</body>
</html>
