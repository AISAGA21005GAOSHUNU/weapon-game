<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>武器实验室：零件补完计划 (教师演示版)</title>
    <style>
        :root { --neon-blue: #00f3ff; --neon-pink: #ff00ff; --bg-dark: #0a0b10; }
        body { background: var(--bg-dark); color: white; font-family: 'PingFang SC', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        
        /* 标题与零件库 */
        header { width: 100%; text-align: center; padding: 15px 0; background: rgba(0,0,0,0.8); position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--neon-blue); }
        h1 { margin: 0 0 10px 0; font-size: 1.5em; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }
        
        .inventory { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; padding: 10px; }
        .part { padding: 12px 20px; background: var(--neon-pink); cursor: pointer; font-weight: bold; border-radius: 8px; font-size: 1.2em; box-shadow: 0 4px 0 #b000b0; transition: 0.1s; }
        .part:active { transform: translateY(4px); box-shadow: none; }

        /* 武器列表布局 */
        .weapon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; width: 100%; max-width: 1200px; margin-top: 20px; padding-bottom: 50px; }
        .weapon-card { background: #161821; border: 1px solid #333; border-radius: 8px; padding: 12px; position: relative; cursor: pointer; border-left: 4px solid var(--neon-blue); }
        .weapon-card.selected { border: 2px solid var(--neon-pink); background: #1e1525; }
        
        .weapon-id { color: #888; font-size: 0.8em; margin-bottom: 5px; }
        .weapon-name { font-size: 1.1em; display: flex; align-items: center; flex-wrap: wrap; height: 40px; }
        .power-val { color: var(--neon-blue); font-weight: bold; margin-top: 5px; font-size: 0.9em; }
        
        .drop-zone { color: #fff; background: #333; border-radius: 4px; padding: 2px 6px; margin: 0 2px; min-width: 20px; text-align: center; border-bottom: 2px solid var(--neon-blue); }
        .drop-zone.filled { background: transparent; color: var(--neon-pink); border-bottom: none; }

        .controls { margin-top: 20px; }
        .reset-btn { background: #444; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1>⚔️ 零件补完计划 (教师演示版)</h1>
        <div class="inventory" id="part-box">
            <div class="part" onclick="fillPart('枪')">枪</div>
            <div class="part" onclick="fillPart('步')">步</div>
            <div class="part" onclick="fillPart('弹')">弹</div>
            <div class="part" onclick="fillPart('机')">机</div>
            <div class="part" onclick="fillPart('手')">手</div>
            <div class="part" onclick="fillPart('器')">器</div>
            <div class="part" onclick="fillPart('轮')">轮</div>
        </div>
        <div style="font-size: 0.9em; color: #aaa;">请先点击下方武器卡片，再点击上方零件填入</div>
    </header>

    <div class="weapon-grid" id="weapon-grid"></div>

    <div class="controls">
        <button class="reset-btn" onclick="resetGame()">重新开始任务</button>
    </div>

    <script>
        // 完整的 20 种武器数据 
        const weaponData = [
            { id: 1, prefix: "突击", ans: "步枪", power: 300 },
            { id: 2, prefix: "异能", ans: "枪", power: 210 },
            { id: 3, prefix: "汽油", ans: "弹", power: 200 },
            { id: 4, prefix: "左", ans: "轮", power: 165 },
            { id: 5, prefix: "扭曲", ans: "器", power: 130 },
            { id: 6, prefix: "变形", ans: "机", power: 120 },
            { id: 7, prefix: "榴", ans: "弹发射器", power: 110 },
            { id: 8, prefix: "反器材", ans: "步枪", power: 105 },
            { id: 9, prefix: "机", ans: "枪", power: 100 },
            { id: 10, prefix: "加特林", ans: "机枪", power: 100 },
            { id: 11, prefix: "永冻", ans: "枪", power: 95 },
            { id: 12, prefix: "狙击", ans: "步枪", power: 90 },
            { id: 13, prefix: "竞敌重槌", ans: "枪", power: 80 },
            { id: 14, prefix: "手", ans: "枪", power: 75 },
            { id: 15, prefix: "权", ans: "器", power: 70 },
            { id: 16, prefix: "霰", ans: "弹枪", power: 65 },
            { id: 17, prefix: "卡宾", ans: "枪", power: 60 },
            { id: 18, prefix: "冲锋", ans: "枪", power: 50 },
            { id: 19, prefix: "信号", ans: "枪", power: 30 },
            { id: 20, prefix: "烟雾", ans: "弹", power: 1 }
        ];

        let selectedIdx = 0;
        let progress = Array(20).fill("");

        function render() {
            const grid = document.getElementById('weapon-grid');
            grid.innerHTML = '';
            weaponData.forEach((w, i) => {
                const card = document.createElement('div');
                card.className = `weapon-card ${i === selectedIdx ? 'selected' : ''}`;
                card.onclick = () => { selectedIdx = i; render(); };
                
                const current = progress[i] || "？";
                card.innerHTML = `
                    <div class="weapon-id">NO.${w.id}</div>
                    <div class="weapon-name">${w.prefix}<span class="drop-zone ${progress[i]?'filled':''}">${current}</span></div>
                    <div class="power-val">力量值: ${w.power}</div>
                `;
                grid.appendChild(card);
            });
        }

        function fillPart(char) {
            progress[selectedIdx] = char;
            // 简单逻辑：填入后自动跳到下一个未填写的武器，方便老师连续操作
            if(selectedIdx < 19) selectedIdx++;
            render();
        }

        function resetGame() {
            if(confirm("确定要重置所有零件吗？")) {
                progress = Array(20).fill("");
                selectedIdx = 0;
                render();
            }
        }

        render();
    </script>
</body>
</html>
